
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'textile-monitoring'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api-gateway:5000']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'zigbee-ingest'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['zigbee-ingest:9101']
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'population-sim'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['population-sim:9102']
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'mildew-gompertz'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['mildew-gompertz:9103']
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'alert-dispatch'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['alert-dispatch:9104']
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    scrape_interval: 15s
    scrape_timeout: 5s

  - job_name: 'sqlserver'
    static_configs:
      - targets: ['sqlserver-exporter:9399']
    scrape_interval: 30s
    scrape_timeout: 10s
